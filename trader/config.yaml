# Fetcher2026 Configuration — fetch-only, no trading sections

ib:
  live_host: 127.0.0.1
  live_port: 4002
  live_client_ids: [101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120]
  paper_host: 127.0.0.1
  paper_port: 4002
  paper_client_ids: [201, 202, 203, 204, 205, 206, 207, 208, 209, 210]
  reconnect_interval_seconds: 30
  connection_timeout: 5
  fetcher_client_ids: [801, 802, 803, 804]
  ibc_startgateway_bat: "C:\\IBC\\StartGateway.bat"
  ibc_mode: paper

symbols:
  - MES
  - MNQ
  - MYM
  - M2K

fetcher:
  auto_fetch_enabled: true
  fetch_bid_ask: true
  backfill_bid_ask: true
  backfill_days: 180
  fetch_on_startup: true
  symbols_override:
    - MES
    - MNQ
    - MYM
    - M2K
  trigger_time_ct: "17:30"

session:
  timezone: America/Chicago

# Stub sections required by config_loader validation — not used by fetcher
orders:
  tp_ticks: 4
  sl_ticks: 4
  active_brackets: [4, 4]
  tick_size: 0.25
  quantity_per_symbol:
    MES: 2
    MNQ: 1
    MYM: 1
    M2K: 1

position:
  stagnation_seconds: 300
  stagnation_min_move_points: 0.5
  sl_cooldown_seconds: 30

shutdown:
  exit_patience_seconds: 30
  panic_threshold_minutes: 10

decider:
  replenishment_poll_seconds: 10

broker:
  command_poll_seconds: 5
  ib_poll_seconds: 30

paths:
  db: C:\Projects\Galgo2026\june\data\galao.db
  history: data/history
  logs: logs

google_drive:
  enabled: false
  credentials_path: ""
  history_folder_id: ""

visualizer:
  host: 127.0.0.1
  port: 5050
